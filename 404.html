<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Big Wave Roofing</title>
  <script>
    // GitHub Pages SPA redirect: preserve the path as a query param,
    // then App.tsx reads it and does a history.replaceState to the clean URL.
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    var redirectUrl = '/?p=' + encodeURIComponent(path) +
      (search ? '&q=' + encodeURIComponent(search.slice(1)) : '') +
      hash;
    window.location.replace(redirectUrl);
  </script>
</head>
<body></body>
</html>
